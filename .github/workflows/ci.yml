name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Lint & Type Check ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Mypy type check
        run: mypy app/

  # ─── Backend Unit Tests ───────────────────────────────────────────────────────
  backend-unit-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend-unit

  # ─── Backend Integration Tests ────────────────────────────────────────────────
  backend-integration-tests:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soc_test
          POSTGRES_USER: soc_test
          POSTGRES_PASSWORD: soc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://soc_test:soc_test@localhost:5432/soc_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test_jwt_secret_minimum_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters_long
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest tests/integration/ -v --cov=app --cov-report=xml

  # ─── Frontend Lint & Type Check ───────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  # ─── Agent Script Integrity Check ────────────────────────────────────────────
  # Prevents serving a syntactically-broken agent script to end users.
  # Root cause of June 2026 outage: smart-quote substitution + encoding mojibake
  # in soc_agent_v2.py went undetected because scripts/ was excluded from linting.
  agent-script-check:
    name: Agent Script — Syntax & Encoding Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify soc_agent_v2.py — Python syntax
        run: python -W error -m py_compile backend/scripts/soc_agent_v2.py

      - name: Verify soc_agent_v2.py — no curly/smart quotes
        run: |
          python - << 'EOF'
          import sys
          path = "backend/scripts/soc_agent_v2.py"
          src = open(path, encoding="utf-8").read()
          bad = [(i+1, hex(ord(c))) for i, c in enumerate(src) if ord(c) in (0x201C, 0x201D, 0x2018, 0x2019)]
          if bad:
              print(f"FAIL: {len(bad)} smart-quote characters found in {path}")
              for lineno_approx, cp in bad[:10]:
                  print(f"  char {lineno_approx}: {cp}")
              sys.exit(1)
          print(f"OK: no smart-quote characters in {path}")
          EOF

      - name: Verify soc_agent_v2.py — no UTF-8/Windows-1252 mojibake
        run: |
          python - << 'EOF'
          import sys
          path = "backend/scripts/soc_agent_v2.py"
          src = open(path, encoding="utf-8").read()
          # mojibake pattern: U+00E2 followed by U+20AC is a signature of
          # CP1252-decoded UTF-8 multi-byte sequences (e.g. EM DASH, box-drawing chars)
          mojibake = [i+1 for i in range(len(src)-1)
                      if ord(src[i]) == 0x00E2 and ord(src[i+1]) == 0x20AC]
          if mojibake:
              print(f"FAIL: mojibake sequences found at positions: {mojibake[:10]}")
              sys.exit(1)
          print(f"OK: no mojibake sequences in {path}")
          EOF

      - name: Verify bootstrap.ps1 — UTF-8 encoding
        run: |
          python - << 'EOF'
          import sys
          path = "backend/scripts/bootstrap.ps1"
          try:
              open(path, encoding="utf-8").read()
              print(f"OK: {path} is valid UTF-8")
          except UnicodeDecodeError as e:
              print(f"FAIL: {path} is not valid UTF-8: {e}")
              sys.exit(1)
          EOF

  # ─── Docker Build Check ───────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target development ./backend

      - name: Build frontend image
        run: docker build --target builder ./frontend

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-unit-tests, frontend-lint, docker-build, agent-script-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (staging)
        run: |
          echo "Deploy to Railway staging environment"
          # railway up --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
